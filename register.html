<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vault | Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
        .card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; width: 400px; padding: 2.5rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .form-control { background: #1e293b; border: 1px solid #334155; color: white; border-radius: 0.75rem; padding: 0.75rem; }
        .form-control:focus { background: #1e293b; color: white; border-color: #38bdf8; box-shadow: none; }
        .btn-info { background: #38bdf8; border: none; font-weight: 700; border-radius: 0.75rem; padding: 0.75rem; transition: 0.3s; color: #0f172a; }
        .btn-info:hover { background: #7dd3fc; transform: translateY(-2px); }
        .login-link { color: #38bdf8; text-decoration: none; font-size: 0.85rem; }
        .login-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card shadow">
        <h2 class="text-center mb-2 fw-bold">Create Account</h2>
        <p class="text-center text-muted small mb-4">Join the Secure AI Vault</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning py-2 small border-0 mb-3" style="background: rgba(245, 158, 11, 0.2); color: #fbbf24;">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" class="form-control mb-3" required>
            <input type="password" name="password" placeholder="Create Password" class="form-control mb-4" required>
            <button type="submit" class="btn btn-info w-100 fw-bold">REGISTER</button>
        </form>
        
        <p class="mt-4 text-center small">
            <span class="text-muted">Already have an account?</span>
            <a href="/login" class="login-link ms-1">Login</a>
        </p>
    </div>
</body>
</html>
