<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Vault | Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 2.5rem; border-radius: 1.5rem; width: 100%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .form-control { background: #1e293b; border: 1px solid #334155; color: white; border-radius: 0.75rem; padding: 0.75rem; }
        .form-control:focus { background: #1e293b; color: white; border-color: #38bdf8; box-shadow: none; }
        .btn-primary { background: #38bdf8; border: none; font-weight: 700; border-radius: 0.75rem; padding: 0.75rem; transition: 0.3s; color: #0f172a; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-box text-center">
        <h2 class="mb-2 fw-bold">🛡️ AI Vault</h2>
        <p class="text-muted mb-4 small">Multi-Factor Encrypted Gateway</p>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-danger py-2 small">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-4" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100">AUTHENTICATE</button>
        </form>
    </div>
</body>
</html>
