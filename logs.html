<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vault | Audit Logs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: white; padding: 2rem; }
        .table { color: white; background: rgba(30, 41, 59, 0.5); border-radius: 1rem; overflow: hidden; }
        .status-success { color: #4ade80; }
        .status-blocked { color: #f87171; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🛡️ System Security Audit</h2>
            <a href="/" class="btn btn-outline-info">Back to Vault</a>
        </div>
        <table class="table table-hover">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>User</th>
                    <th>Action</th>
                    <th>Status</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.timestamp.strftime('%d-%m-%Y | %I:%M %p') }}</td>
                    <td>{{ log.user.username }}</td>
                    <td>{{ log.action }}</td>
                    <td class="status-{{ log.status.lower() }}">{{ log.status }}</td>
                    <td class="small">{{ log.details }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
